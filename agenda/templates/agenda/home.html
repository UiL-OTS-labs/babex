{% extends 'base/base.html' %}
{% load static %}


{% block html_head %}
<script src="{% static 'js/htmx.js' %}"></script>
<script src="{% static 'js/fullcalendar.min.js' %}"></script>
<link rel="stylesheet" href="{%static 'css/fullcalendar.min.css' %}"/>

<style>
    /* clear UU styling */
    table thead th {
        border-bottom: unset;
    }

    table tfoot th {
        border-top: unset;
    }

    table tbody tr:nth-of-type(odd) {
        background: unset;
    }

    table tbody tr:hover {
        background: unset;
    }

    table tbody tr.no-background:hover, table tbody tr.no-background {
        background: unset;
    }

    table tbody td, table thead th, table tfoot th {
        padding: unset;
    }

    .fc-event {
        cursor: pointer;
    }

    .event-selected {
        background: #8ac4fd;
        border-color: #8ac4fd;
    }
    .action-panel {
        background: #eee;
        padding: 8px;

    }
</style>

{% endblock %}



{% block content %}
<div class="row">
  <div class="col-10">
    <div id="calendar">
    </div>
  </div>
  <div class="col-2">
    <div id="agenda_actions"></div>
  </div>
</div>

<script>
    const calendarOptions = {
        initialView: 'dayGridMonth',
        headerToolbar: {
            end: 'dayGridMonth timeGridWeek today prev,next',
        },
        allDaySlot: false,
        slotMinTime: "05:00:00",
        slotMaxTime: "22:00:00",
        eventTimeFormat: {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        },
        displayEventEnd: true,
        eventSources: [
            {
                url: '{% url 'agenda:feed' %}',
                eventDataTransform: formatAppointment
            },
            {
                url: '/agenda/closing',
                eventDataTransform: formatClosing,
                color: 'gray'
            },
        ],
        eventContent: eventRender,
        selectable: true,
        select: onSelect,
        eventClick: onEventClick,
    };

    function eventRender(arg) {
        // override built-in template with multiline support
        return {
            html: `<div class="fc-event-main-frame"><div class="fc-event-time">${arg.timeText}</div>
              <div class="fc-event-title-container">
                <div class="fc-event-title fc-sticky">${arg.event.title}</div>
              </div></div>
              <div>${arg.event.extendedProps.extra}</div>`
        }
    }

    function deselectEvents() {
        document.querySelectorAll('.event-selected').forEach(
            (el) => {el.classList.remove('event-selected');}
        );
    }

    function onSelect(selectionInfo) {
        deselectEvents();
        let params = `?start=${selectionInfo.startStr}&end=${selectionInfo.endStr}`;
        htmx.ajax('GET', "{% url 'agenda:closing.add' %}" + params, '#agenda_actions');
    }

    function onEventClick(eventInfo) {
        deselectEvents();
        let element = eventInfo.el;
        element.classList.add('event-selected');

        let event = eventInfo.event;
        if (event.extendedProps.category === 'appointment') {
            htmx.ajax('GET', "/agenda/appointment/" + event.id, '#agenda_actions');
        }
        else {
            htmx.ajax('GET', "/agenda/closing/" + event.id, '#agenda_actions');
        }
    }

    function formatAppointment(event) {
        return {
            id: event.id,
            start: event.start,
            end: event.end,
            title: event.participant,
            // extra field will be displayed in a separate line
            extra: `${event.location} (${event.leader})`,
            display: 'block',
            category: 'appointment'
        };
    }

    function formatClosing(event) {
        return {
            id: event.id,
            start: event.start,
            end: event.end,
            title:'Closed',
            extra: event.is_global ? 'Entire building' : event.location,
            display: 'block',
            category: 'closing',
            comment: event.comment
        };
    }

    let calendar;

    function agendaRefresh() {
        calendar.getEventSources().forEach((source) => source.refetch());
    }

    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, calendarOptions);
        calendar.render();
    });

    document.body.addEventListener('agendaRefresh', agendaRefresh);
</script>
{% endblock %}
